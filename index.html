<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Greeting Section -->
        <section class="greeting-section">
            <h1 id="greeting">Good Morning</h1>
            <p id="datetime"></p>
            <div class="name-input">
                <input type="text" id="userName" placeholder="Enter your name">
                <button id="saveName">Save</button>
            </div>
        </section>

        <!-- Theme Toggle -->
        <button class="theme-toggle" id="themeToggle">🌙</button>

        <!-- Focus Timer Section -->
        <section class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-settings">
                <label for="timerDuration">Duration (minutes):</label>
                <input type="number" id="timerDuration" min="1" max="60" value="25">
                <button id="setDuration">Set</button>
            </div>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="startTimer">Start</button>
                <button id="stopTimer">Stop</button>
                <button id="resetTimer">Reset</button>
            </div>
        </section>

        <!-- To-Do List Section -->
        <section class="todo-section">
            <h2>To-Do List</h2>
            <div class="todo-input">
                <input type="text" id="taskInput" placeholder="Add a new task...">
                <button id="addTask">Add</button>
            </div>
            <div class="todo-sort">
                <button id="sortTasks">Sort A-Z</button>
            </div>
            <ul id="taskList"></ul>
        </section>

        <!-- Quick Links Section -->
        <section class="links-section">
            <h2>Quick Links</h2>
            <div class="link-input">
                <input type="text" id="linkName" placeholder="Link name">
                <input type="url" id="linkUrl" placeholder="https://example.com">
                <button id="addLink">Add Link</button>
            </div>
            <div id="linksList"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
